<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 år fra Geologi og Geofare studiet i Sogndal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #333;
      background-color: #fff;
    }

    header {
      text-align: center;
      padding: 20px 10px 10px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    header p {
      font-size: 1rem;
      color: #555;
    }

    .content {
      display: flex;
      flex-wrap: wrap;
      padding: 20px 30px;
      gap: 30px;
    }

    .text-section {
      flex: 1 1 300px;
      display: flex;
      align-items: center;
      min-height: 400px;
    }

    .text-section p {
      font-size: 1rem;
      line-height: 1.6;
      color: #444;
    }

    .gallery-section {
      flex: 1.5 1 400px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto auto;
      gap: 10px;
    }

    .gallery-grid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
    }

    .gallery-grid .tall {
      grid-row: span 2;
      height: 100%;
    }

    .footer-section {
      padding: 40px 30px;
      min-height: 150px;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.6rem;
      }

      .content {
        flex-direction: column;
      }

      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .gallery-grid .tall {
        grid-row: span 1;
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>3 år fra Geologi og Geofare studiet i Sogndal</h1>
    <p>Denne nettsiden er laget av</p>
  </header>

  <main>
    <section class="content">
      <div class="text-section">
        <p>This text should be replaced with information about you and your business.</p>
      </div>

      <div class="gallery-section">
        <div class="gallery-grid">
          <!-- Row 1 -->
          <img
            src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&h=400&fit=crop"
            alt="Mountain range panoramic view"
          />
          <img
            src="https://images.unsplash.com/photo-1529963183134-61a90db47eaf?w=600&h=400&fit=crop"
            alt="Matterhorn snow-capped peak"
          />
          <img
            src="https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=600&h=400&fit=crop"
            alt="Blue sky above clouds and mountains"
          />
          <!-- Row 2: first image is tall spanning two rows -->
          <img
            class="tall"
            src="https://images.unsplash.com/photo-1472396961693-142e6e269027?w=600&h=800&fit=crop"
            alt="Red rock canyon landscape"
          />
          <img
            src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=400&fit=crop"
            alt="Stone cairn with mountain sunset"
          />
          <img
            src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600&h=400&fit=crop"
            alt="Snow-covered mountain peaks"
          />
        </div>
      </div>
    </section>

    <section class="footer-section">
      <!-- Additional content can be added here -->
    </section>
  </main>
</body>
</html>
